<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GPS Attendance - Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #f8f9fa; }
        .hero-app { background: linear-gradient(135deg, #0d6efd 0%, #0a4ed8 100%); color: white; padding: 40px 20px; border-radius: 0 0 30px 30px; }
        .status-card { border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-check { background: linear-gradient(135deg, #198754 0%, #146c43 100%); color: white; border: none; padding: 15px 30px; border-radius: 15px; font-size: 18px; font-weight: 600; }
        .btn-check:active { transform: scale(0.98); }
        .btn-check.checked-in { background: linear-gradient(135deg, #dc3545 0%, #bb2d3b 100%); }
        .location-box { background: #e9ecef; border-radius: 10px; padding: 15px; text-align: center; }
        .sync-indicator { position: fixed; top: 10px; right: 10px; z-index: 9999; }
        .offline-badge { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ffc107; color: #000; padding: 10px 20px; border-radius: 20px; display: none; }
    </style>
</head>
<body>
    <div class="sync-indicator" id="syncIndicator">
        <span class="badge bg-secondary"><i class="bi bi-cloud-check"></i> Synced</span>
    </div>

    <div id="loginPage">
        <div class="hero-app text-center">
            <i class="bi bi-geo-alt-fill" style="font-size: 3rem;"></i>
            <h2 class="mt-3">GPS Attendance</h2>
            <p class="opacity-75">Employee Mobile Portal</p>
        </div>
        <div class="container mt-4">
            <div class="card status-card p-4">
                <div id="loginError" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password">
                </div>
                <button class="btn btn-primary w-100" onclick="login()"><i class="bi bi-box-arrow-in-right"></i> Login</button>
            </div>
        </div>
    </div>

    <div id="dashboardPage" class="d-none">
        <div class="hero-app text-center">
            <div class="d-flex justify-content-between align-items-center">
                <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-left"></i></button>
                <div>
                    <i class="bi bi-geo-alt-fill" style="font-size: 2rem;"></i>
                    <h4 class="mt-2" id="userName">Employee</h4>
                    <p class="opacity-75 small" id="userDept">Department</p>
                </div>
                <div style="width: 50px;"></div>
            </div>
        </div>

        <div class="container mt-4">
            <div class="card status-card p-4 mb-4">
                <h5 class="mb-3"><i class="bi bi-clock"></i> Check In / Out</h5>
                <div class="mb-3">
                    <label class="form-label">Select Site</label>
                    <select id="siteSelect" class="form-select">
                        <option value="">Loading sites...</option>
                    </select>
                </div>
                <div class="location-box mb-3" id="locationStatus">
                    <i class="bi bi-crosshair"></i>
                    <p class="mb-0">Tap button to get location</p>
                </div>
                <div class="d-grid gap-2">
                    <button id="checkinBtn" class="btn btn-check" onclick="handleCheckIn()">
                        <i class="bi bi-check-circle"></i> Check In
                    </button>
                </div>
                <div id="activeSession" class="mt-3 d-none">
                    <div class="alert alert-info">
                        <strong>Checked in at:</strong> <span id="checkinTime"></span><br>
                        <strong>Location:</strong> <span id="checkinLocation"></span>
                    </div>
                </div>
            </div>

            <div class="card status-card p-4 mb-4">
                <h5 class="mb-3"><i class="bi bi-history"></i> Recent Attendance</h5>
                <div id="attendanceList">
                    <p class="text-muted text-center">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="offline-badge" id="offlineBadge">
        <i class="bi bi-wifi-off"></i> Offline Mode
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
